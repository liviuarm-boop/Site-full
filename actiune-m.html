*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
 --black: #080B0F;
 --dark: #0D1117;

}

 :root {

}
html { scroll-behavior: smooth; font-size: 15px; }
body {
 background: var(--black);
 color: var(--text);
 font-family: var(--font-body);
 line-height: 1.6;
 overflow-x: hidden;

 width: 100%;

}
body::before {
 content: '';
 position: fixed; inset: 0;

 pointer-events: none; z-index: 0; opacity: 0.5;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
img { max-width: 100%; height: auto; display: block; }
h1, h2, h3, h4 {
 font-family: var(--font-display);
 -webkit-font-smoothing: antialiased;

}
h1 { font-size: clamp(18px, 2vw, 28px); font-weight: 700; }
h2 { font-size: clamp(18px, 2.5vw, 28px); font-weight: 700; }
h3 { font-size: clamp(15px, 2vw, 20px); font-weight: 600; }

nav {

 padding: 0 20px;

 border-bottom: 1px solid var(--border);
}

.nav-logo {

 flex-shrink: 0;
}
@media (min-width: 768px) { .nav-logo { font-size: 22px; } }
.nav-logo span { color: var(--accent); }
.nav-logo:hover { text-decoration: none; }
.nav-dot {

}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }
.nav-links {
 display: none;

}
@media (min-width: 768px) { .nav-links { display: flex; } }
.nav-links a { color: var(--muted); font-size: 14px; font-weight: 500; transition: color .2s; text-decoration: none; }
.nav-links a:hover { color: var(--text); }
.nav-cta {

}
.nav-cta:hover { opacity: .85; }
.hamburger {
 display: flex; flex-direction: column; gap: 5px;

}
@media (min-width: 768px) { .hamburger { display: none; } }
.hamburger span {
 display: block; width: 22px; height: 2px;

 transition: all .3s;
}
.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
.mobile-nav {
 display: none; position: fixed;
 top: var(--nav-h); left: 0; right: 0;

 border-bottom: 1px solid var(--border);
 z-index: 199; flex-direction: column;
 padding: 8px 0 16px;
 transform: translateY(-10px); opacity: 0;
 transition: transform .25s, opacity .25s;
}
.mobile-nav.open {
 display: flex; transform: translateY(0); opacity: 1;
}
.mobile-nav a {

}
.mobile-nav a:last-child { border-bottom: none; }
.mobile-nav a:hover { background: rgba(0,212,255,.05); }
.mobile-nav .mobile-cta {
 margin: 12px 24px 0;
 background: var(--accent); color: var(--black) !important;
 border-radius: 8px; text-align: center; font-weight: 700 !important;
 border-bottom: none !important;
}
.ticker-bar {
 position: sticky;
 top: var(--nav-h);
 z-index: 150;
 height: var(--ticker-h);
 background: rgba(8,11,15,.98);

 overflow: hidden;
}
.ticker-bar .tradingview-widget-container,
.ticker-bar .tradingview-widget-container__widget { height: 100% !important; }
.section-inner { max-width: 1280px; margin: 0 auto; padding: 0 20px; }

 opacity:0;
 transition:opacity .65s cubic-bezier(.4,0,.2,1),transform .65s cubic-bezier(.4,0,.2,1);
 will-change:opacity,transform;
}
.reveal{transform:translateY(28px)}
.reveal-left{transform:translateX(-28px)}
.reveal-right{transform:translateX(28px)}
.reveal-scale{transform:scale(.96)}
.reveal.visible,.reveal-left.visible,.reveal-right.visible,.reveal-scale.visible{
 opacity:1;transform:none;
}

 font-family: var(--font-display); font-weight: 700;

.btn:hover { opacity: .85; transform: translateY(-1px); text-decoration: none; }
.btn:active { transform: translateY(0); }
.btn-primary { background: var(--accent); color: var(--black); padding: 13px 24px; font-size: 14px; }
.btn-secondary { background: rgba(0,212,255,.1); border: 1px solid rgba(0,212,255,.25); color: var(--accent); padding: 12px 22px; font-size: 14px; }

.btn-ghost:hover { border-color: var(--text); color: var(--text); }
.btn-green { background: rgba(0,255,148,.1); border: 1px solid rgba(0,255,148,.25); color: var(--accent2); padding: 12px 22px; font-size: 14px; }
.btn-full { width: 100%; }
.btn-sm { padding: 8px 14px; font-size: 12px; }
.btn-lg { padding: 16px 32px; font-size: 16px; }

<script>
(function(){
  if(!('IntersectionObserver' in window)) return;
  var observer = new IntersectionObserver(function(entries, obs){
    entries.forEach(function(entry){
      if(!entry.isIntersecting) return;
      obs.unobserve(entry.target);
      var el = entry.target;
      var cfg = el.getAttribute('data-tv-config');
      var src = el.getAttribute('data-tv-src');
      if(!cfg || !src) return;
      el.removeAttribute('data-tv-config');
      el.removeAttribute('data-tv-src');
      var widget = el.querySelector('.tradingview-widget-container__widget');
      if(!widget) return;
      var s = document.createElement('script');
      s.src = src;
      s.async = true;
      s.type = 'text/javascript';
      s.text = cfg;
      el.appendChild(s);
    });
  }, {rootMargin:'300px'});
  document.querySelectorAll('.tv-lazy').forEach(function(el){ observer.observe(el); });
})();
</script>
